volumes:
  stackerdb:
    driver: local

  stacker-redis-data:
    driver: local

networks:
  trydirect_default:
    driver: bridge
    external: true
  trydirect-network:
    external: true
    name: trydirect-network

services:
  stacker:
    image: trydirect/stacker:latest
    #image: trydirect/stacker:test
    container_name: stacker
    restart: always
    volumes:
      - ./stacker/files:/app/files
      - ./.env:/app/.env
      - ./configuration.yaml:/app/configuration.yaml
      - ./access_control.conf:/app/access_control.conf
      - ./migrations:/app/migrations
      - ./stacker/ansible:/ansible/roles:ro
    ports:
      - "8001:8000"
    env_file:
      - ./.env
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=full
    depends_on:
      stackerdb:
        condition: service_healthy
    networks:
      - trydirect_default

  stackermq:
    image: trydirect/stacker:latest
    #image: trydirect/stacker:test  # for testing mcp
    container_name: stackermq
    restart: always
    volumes:
      - ./configuration.yaml:/app/configuration.yaml
      - ./.env:/app/.env
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1
    env_file:
      - ./.env
    depends_on:
      stackerdb:
        condition: service_healthy
    entrypoint: /app/console mq listen
    networks:
      - trydirect_default

  stackerdb:
    container_name: stackerdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    image: postgres:16.0
    restart: always
    ports:
      - 5434:5432
    env_file:
      - ./.env
    volumes:
      - stackerdb:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - trydirect_default

  stackerredis:
    container_name: stackerredis
    image: redis:latest
    restart: always
    ports:
      - 127.0.0.1:6379:6379
    volumes:
      - stacker-redis-data:/data
    #        - ./redis/rc.local:/etc/rc.local
    #        - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    sysctls:
      net.core.somaxconn: 1024
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        tag: "container_{{.Name}}"
    networks:
      - trydirect_default

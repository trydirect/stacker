name: website
version: 1.0.0
organization: null
#project:
#  identity: optimize
 # identity: myproject1
app:
  type: node
  path: .
  dockerfile: Dockerfile
  image: null
  build: null
  ports: []
  volumes: []
  environment: {}
services:
- name: web
  image: trydirect/stacker-website:latest
  ports:
  - 3456:3456
  environment: {}
  volumes:
  - .:/app
  depends_on: []
- name: minio
  image: minio/minio:latest
  ports:
  - 9000:9000
  - 9001:9001
  environment:
    MINIO_ROOT_USER: admin
    MINIO_ROOT_PASSWORD: changeme123
  volumes:
  - minio_data:/data
  depends_on: []
proxy:
  type: nginx
  auto_detect: true
  domains:
  - domain: stacker.my
    ssl: auto
    upstream: app:3456
  config: null
deploy:
  target: server
  compose_file: null
  cloud: null
  server:
    host: 162.55.166.57
    user: root
    key: 59
    port: 22
  registry:
    username: trydirect
    password: ${DOCKER_PASSWORD}
    server: https://index.docker.io/v1/
ai:
  enabled: true
  provider: ollama
  model: glm4.7-flash
  api_key: null
  endpoint: http://ai.try.direct:11434
  timeout: 300
  tasks:
  - dockerfile
  - compose
monitoring:
  status_panel: true
  healthcheck:
    endpoint: /healthz
    interval: 10s
  metrics: null
hooks:
  pre_build: scripts/pre-build.sh
  post_deploy: scripts/post-deploy.sh
  on_failure: scripts/on-failure.sh
env_file: .env
env: {}